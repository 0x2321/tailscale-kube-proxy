apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "tailscale-kube-proxy.serviceAccountName" . }}
  labels:
    {{- include "tailscale-kube-proxy.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: true