name: Build and push container
enable-email-notifications: false

on:
  push:
    paths:
      - 'Dockerfile'
      - '**.go'
      - '.forgejo/workflows/docker.yaml'
  release:
    types: [ published ]

jobs:
  build:
    runs-on: docker
    container:
      image: codeberg.org/0x2321/ci:latest
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: codeberg.org/${{ env.FORGEJO_REPOSITORY }}
          tags: |
            type=schedule
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: 'amd64'
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.FORGEJO_SERVER_URL }}
          username: ${{ env.FORGEJO_REPOSITORY_OWNER }}
          password: ${{ secrets.PACKAGE_TOKEN }}
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          context: .